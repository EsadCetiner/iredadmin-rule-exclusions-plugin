# Plugin name: iredadmin-rule-exclusions-plugin
# Plugin description: OWASP CRS 3rd party plugin for iRedAdmin
# Rule ID block base: 9,521,000 - 9,521,999
# Plugin version: 1.0.1

# See readme.md for documentation

# Generic rule to disable the plugin
#
# Plugins are enabled by default.
#
# They become active by placing them in the plugin folder. It is possible to
# control plugin activation via setting a variable. This can be done in the
# plugin config file here.
#
# The predefined variable name is meant to be "<plugin name>-plugin_enabled".
# For the iredadmin-rule-exclusions-plugin, this means it can be disabled by setting
# iredadmin-rule-exclusions-plugin=0
#
# Note that a global setting of this variable overrides the setting here.
# That means the "enabled" variable is only set by this rule if it has not
# been set before.
#
# Feel free to set the variable unconditionally here by replacing the
# SecRule line with an unconditional SecAction statement.
#
# Uncomment to disable this plugin
#
# SecRule &TX:iredadmin-rule-exclusions-plugin "@eq 0" \
#     "id:9521000,\
#     phase:1,\
#     pass,\
#     nolog,\
#     ver:'iredadmin-rule-exclusions-plugin/1.0.1',\
#     setvar:'tx.iredadmin-rule-exclusions-plugin=0'"

# By default, iRedAdmin's base URL is set to `/iredadmin/`.
# It's possible to change the base url to something else like `/admin/`
# or a random string to obfuscate iRedAdmin's location.
# By default, this plugin only supports `/iredadmin/` as the base url however,
# this can be changed if iRedAdmin's base url has been changed.
# See: https://docs.iredmail.org/iredadmin-pro.custom.base.url.html
# WARNING: Do not set the base-url to `/`, as that will enable the plugin
# for all URL paths.
# SecRule &TX:iredadmin-rule-exclusions-base-url "@eq 0" \
#     "id:9519001,\
#     phase:1,\
#     pass,\
#     nolog,\
#     ver:'iredadmin-rule-exclusions-plugin/1.0.1',\
#     setvar:'tx.iredadmin-rule-exclusions-base-url=/iredadmin/'"
